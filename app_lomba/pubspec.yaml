name: app_lomba
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  permission_handler: ^11.3.0

  # Firebase Core & Auth
  firebase_core: ^3.13.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.6
  intl: ^0.18.1
  http: ^1.0.0
  get: ^4.6.6

  # Geolocator 
  geolocator: ^14.0.1
  geocoding: ^2.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Google Maps
  google_maps_flutter: ^2.5.3

  # QR Scanner/Generator
  qr_flutter: ^4.0.0
  mobile_scanner: ^3.2.0
  qr_code_scanner: ^1.0.1

  # Export tools
  excel: ^2.0.6
  csv: ^5.0.0
  url_launcher: ^6.1.14


  # File access
  path_provider: ^2.1.2
  image_picker: ^0.8.7+5
  path: ^1.9.0
  share_plus: ^7.2.1

  # State management
  provider: ^6.1.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg
    - assets/logo.png
    - assets/bg.jpg

